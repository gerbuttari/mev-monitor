<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEV Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 480px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); padding: 28px 32px; color: white; }
    .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .header p { opacity: 0.75; font-size: 13px; }
    .body { padding: 28px 32px; }
    .section-label { font-size: 11px; font-weight: 600; color: #9e9e9e; text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 10px; }
    .section-label:first-child { margin-top: 0; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; background: #fafafa; margin-bottom: 14px; }
    input:focus { outline: none; border-color: #1a237e; background: white; }
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { width: 100%; padding: 13px; background: #1a237e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
    .btn:hover { background: #283593; }
    .btn:disabled { background: #9e9e9e; cursor: not-allowed; }
    #status-area { margin-top: 20px; display: none; }
    .status-box { padding: 14px 16px; border-radius: 10px; font-size: 13px; display: flex; align-items: flex-start; gap: 10px; }
    .status-running { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
    .status-done { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .status-error { background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #90caf9; border-top-color: #1565c0; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { padding: 14px 32px; font-size: 11px; color: #bbb; text-align: center; background: #fafafa; border-top: 1px solid #f0f0f0; }
    .footer a { color: #1a237e; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>MEV Monitor</h1>
      <p>Novedades judiciales por email</p>
    </div>
    <div class="body">
      <div class="section-label">Credenciales MEV</div>
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" placeholder="Tu usuario de la MEV" autocomplete="username">
      <label for="password">Contrasena</label>
      <input type="password" id="password" placeholder="Tu contrasena" autocomplete="current-password">
      <div class="section-label">Periodo a consultar</div>
      <div class="date-row">
        <div>
          <label for="fechaDesde">Desde</label>
          <input type="date" id="fechaDesde">
        </div>
        <div>
          <label for="fechaHasta">Hasta</label>
          <input type="date" id="fechaHasta">
        </div>
      </div>
      <div class="section-label">Destino</div>
      <label for="emailDestino">Enviar resultados a</label>
      <input type="email" id="emailDestino" placeholder="tu@email.com">
      <button class="btn" id="btn-scan" onclick="iniciarScan()">Buscar novedades y enviar email</button>
      <div id="status-area">
        <div id="status-box" class="status-box"></div>
      </div>
    </div>
    <div class="footer">
      <a href="https://mev.scba.gov.ar" target="_blank">Mesa de Entradas Virtual</a> &middot; SCBA
    </div>
  </div>
  <script>
    const hoy = new Date();
    const hace7 = new Date(hoy - 7 * 86400000);
    document.getElementById('fechaHasta').value = hoy.toISOString().split('T')[0];
    document.getElementById('fechaDesde').value = hace7.toISOString().split('T')[0];

    function formatDateArg(isoDate) {
      if (!isoDate) return '';
      const [y, m, d] = isoDate.split('-');
      return d + '/' + m + '/' + y;
    }

    function setStatus(type, icon, title, detail) {
      const area = document.getElementById('status-area');
      const box = document.getElementById('status-box');
      area.style.display = 'block';
      box.className = 'status-box status-' + type;
      if (type === 'running') {
        box.innerHTML = '<div class="spinner"></div><div><strong>' + title + '</strong><br>' + detail + '</div>';
      } else {
        box.innerHTML = '<span style="font-size:20px">' + icon + '</span><div><strong>' + title + '</strong><br>' + detail + '</div>';
      }
    }

    async function iniciarScan() {
      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;
      const fechaDesde = formatDateArg(document.getElementById('fechaDesde').value);
      const fechaHasta = formatDateArg(document.getElementById('fechaHasta').value);
      const emailDestino = document.getElementById('emailDestino').value.trim();

      if (!usuario || !password || !emailDestino) {
        setStatus('error', 'X', 'Campos incompletos', 'Completa usuario, contrasena y email destino.');
        return;
      }

      const btn = document.getElementById('btn-scan');
      btn.disabled = true;
      setStatus('running', '', 'Consultando la MEV...', 'Esto puede tardar 1-2 minutos.');

      try {
        const res = await fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password, fechaDesde, fechaHasta, emailDestino })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error del servidor');

        const { jobId } = data;
        const interval = setInterval(async () => {
          try {
            const sr = await fetch('/api/status/' + jobId);
            const job = await sr.json();
            if (job.status === 'running') return;
            clearInterval(interval);
            btn.disabled = false;
            if (job.status === 'done') {
              const r = job.result;
              if (r.emailEnviado) {
                setStatus('done', 'OK', 'Email enviado a ' + emailDestino, r.conNovedades + ' causa(s) con novedades de ' + r.total + ' total.');
              } else {
                setStatus('done', '-', 'Sin novedades en el periodo', 'Se revisaron ' + r.total + ' causas. No hay actuaciones entre ' + fechaDesde + ' y ' + fechaHasta + '.');
              }
            } else {
              setStatus('error', 'X', 'Error al procesar', job.error || 'Error desconocido');
            }
          } catch(e) {
            clearInterval(interval);
            btn.disabled = false;
            setStatus('error', 'X', 'Error de conexion', e.message);
          }
        }, 5000);
      } catch(e) {
        btn.disabled = false;
        setStatus('error', 'X', 'Error', e.message);
      }
    }
  </script>
</body>
</html>
