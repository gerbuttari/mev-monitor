<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEV Monitor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: white; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); width: 100%; max-width: 460px; overflow: hidden; }
.header { background: #1a237e; color: white; padding: 24px; }
.header h1 { font-size: 22px; margin-bottom: 4px; }
.header p { opacity: 0.8; font-size: 14px; }
.body { padding: 24px; }
.section-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 10px; }
.section-label:first-child { margin-top: 0; }
label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; margin-bottom: 12px; }
input:focus { border-color: #1a237e; }
.dates { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
button { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
button:hover { background: #283593; }
button:disabled { background: #9e9e9e; cursor: not-allowed; }
.result { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
.result.ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.result.err { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
.result.info { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.footer { text-align: center; padding: 14px; font-size: 12px; color: #aaa; border-top: 1px solid #f0f0f0; }
.footer a { color: #1a237e; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>MEV Monitor</h1>
    <p>Novedades judiciales por email</p>
  </div>
  <div class="body">
    <div class="section-label">Credenciales MEV</div>
    <label>Usuario</label>
    <input type="text" id="usuario" placeholder="Tu usuario de la MEV" autocomplete="username">
    <label>Contrasena</label>
    <input type="password" id="password" placeholder="Tu contrasena" autocomplete="current-password">
    <div class="section-label">Periodo a consultar</div>
    <div class="dates">
      <div><label>Desde</label><input type="date" id="desde"></div>
      <div><label>Hasta</label><input type="date" id="hasta"></div>
    </div>
    <div class="section-label">Destino</div>
    <label>Enviar resultados a</label>
    <input type="email" id="email" placeholder="tu@email.com">
    <button id="btn" onclick="iniciarScan()">Buscar novedades y enviar email</button>
    <div class="result" id="result"></div>
  </div>
  <div class="footer">
    <a href="https://mev.scba.gov.ar" target="_blank">Mesa de Entradas Virtual</a> &middot; SCBA
  </div>
</div>
<script>
(function() {
  const hoy = new Date();
  const hace7 = new Date(hoy - 7 * 86400000);
  const fmt = d => d.toISOString().slice(0, 10);
  document.getElementById('hasta').value = fmt(hoy);
  document.getElementById('desde').value = fmt(hace7);
})();

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return d + '/' + m + '/' + y;
}

function showResult(msg, type) {
  const el = document.getElementById('result');
  el.innerHTML = msg;
  el.className = 'result ' + type;
  el.style.display = 'block';
}

function pollStatus(jobId, attempts) {
  if (attempts > 120) { // 6 minutes (120 * 3s)
    showResult('El scan esta tardando mas de lo esperado. Revisa tu email en unos minutos.', 'info');
    document.getElementById('btn').disabled = false;
    document.getElementById('btn').textContent = 'Buscar novedades y enviar email';
    return;
  }
  fetch('/api/status/' + jobId)
    .then(r => r.json())
    .then(data => {
      if (data.status === 'running') {
        const secs = attempts * 3;
        const mins = Math.floor(secs / 60);
        const s = secs % 60;
        const timeStr = mins > 0 ? mins + 'm ' + s + 's' : secs + 's';
        showResult('Consultando todos los organismos... (' + timeStr + ')<br><small style="opacity:.7">El scan puede tardar hasta 5 minutos revisando todos los juzgados</small>', 'info');
        setTimeout(() => pollStatus(jobId, attempts + 1), 3000);
      } else if (data.status === 'done') {
        const r = data.result;
        document.getElementById('btn').disabled = false;
        document.getElementById('btn').textContent = 'Buscar novedades y enviar email';
        if (r.total === 0) {
          showResult('Sin novedades en el periodo seleccionado.', 'ok');
        } else {
          showResult('Listo! <strong>' + r.total + '</strong> causa' + (r.total !== 1 ? 's' : '') + ' con novedades. Email enviado.', 'ok');
        }
      } else if (data.status === 'error') {
        document.getElementById('btn').disabled = false;
        document.getElementById('btn').textContent = 'Buscar novedades y enviar email';
        showResult('Error: ' + data.error, 'err');
      }
    })
    .catch(e => {
      setTimeout(() => pollStatus(jobId, attempts + 1), 3000);
    });
}

function iniciarScan() {
  const usuario = document.getElementById('usuario').value.trim();
  const password = document.getElementById('password').value.trim();
  const desde = fmtDate(document.getElementById('desde').value);
  const hasta = fmtDate(document.getElementById('hasta').value);
  const email = document.getElementById('email').value.trim();
  if (!usuario || !password || !email) { showResult('Completa todos los campos.', 'err'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Iniciando...';
  showResult('Conectando con MEV...', 'info');
  fetch('/api/scan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ usuario, password, fechaDesde: desde, fechaHasta: hasta, emailDestino: email })
  })
  .then(r => r.json())
  .then(data => {
    if (data.jobId) {
      btn.innerHTML = '<span class="spinner"></span>Escaneando todos los juzgados...';
      showResult('Scan iniciado. Revisando todos los organismos...<br><small style="opacity:.7">Esto puede tardar hasta 5 minutos</small>', 'info');
      setTimeout(() => pollStatus(data.jobId, 0), 3000);
    } else {
      showResult('Error: ' + (data.error || 'respuesta inesperada'), 'err');
      btn.disabled = false;
      btn.textContent = 'Buscar novedades y enviar email';
    }
  })
  .catch(e => {
    showResult('Error de conexion: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Buscar novedades y enviar email';
  });
}
</script>
</body>
</html>
